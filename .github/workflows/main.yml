name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun build
        env:
          BASE_PATH: /portfolio/

      - name: Create .nojekyll
        run: touch .output/public/.nojekyll

      - name: Deploy pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: gh-pages
          folder: .output/public
